name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - "Formula/**"
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libicu-dev ffmpeg imagemagick espeak-ng

      - name: Run unit tests
        run: bundle exec rake test:unit
